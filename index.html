<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Musashi</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            height: 100vh;
            max-height: 100vh;
            overflow: hidden;
            overscroll-behavior: none;
            background: #0c0a07;
        }

        body {
            color: #e2d8c4;
            font-family: 'Noto Serif', Georgia, 'Times New Roman', serif;
            font-size: 14px;
            line-height: 1.8;
        }

        /* ── App shell — fixed, no outer scroll ────── */

        #app {
            display: flex;
            flex-direction: column;
            height: 100vh;
            max-width: 640px;
            margin: 0 auto;
        }

        /* ── Header ─────────────────────────────────── */

        #header {
            flex-shrink: 0;
            text-align: center;
            padding: 14px 24px 0;
        }

        #title {
            font-size: 10px;
            letter-spacing: 0.5em;
            color: #3a3028;
            text-transform: uppercase;
        }

        #title-kanji {
            display: none;
        }

        /* ── Scene image ─────────────────────────────── */

        #image-wrap {
            flex-shrink: 0;
            position: relative;
            width: 100%;
            display: none;
            text-align: center;
            background: #0c0a07;
        }

        #image-wrap.has-image {
            display: block;
        }

        #scene-img {
            display: block;
            margin: 0 auto;
            width: auto;
            height: auto;
            max-width: 100%;
            max-height: 220px;
            opacity: 0;
            transition: opacity 0.8s ease;
        }

        #scene-img.visible {
            opacity: 1;
        }

        #image-wrap::after {
            content: '';
            position: absolute;
            bottom: 0; left: 0; right: 0;
            height: 40px;
            background: linear-gradient(transparent, #0c0a07);
            pointer-events: none;
        }

        /* ── Story zone — scrolls internally ─────────── */

        #story-zone {
            flex: 1;
            overflow-y: auto;
            padding: 20px 28px 12px;
            scrollbar-width: none;
            -ms-overflow-style: none;
            /* fade handled by wrapper opacity */
        }

        #story-zone::-webkit-scrollbar {
            display: none;
        }

        /* ── Content fade wrapper ────────────────────── */

        #content {
            transition: opacity 0.25s ease;
        }

        #content.fading {
            opacity: 0;
        }

        /* ── Paragraphs ──────────────────────────────── */

        .para {
            margin-bottom: 14px;
            opacity: 0;
            transform: translateY(5px);
            animation: appear 0.4s ease forwards;
        }

        /* staggered delay for up to 15 paragraphs */
        .para:nth-child(1)  { animation-delay: 0.00s; }
        .para:nth-child(2)  { animation-delay: 0.05s; }
        .para:nth-child(3)  { animation-delay: 0.10s; }
        .para:nth-child(4)  { animation-delay: 0.15s; }
        .para:nth-child(5)  { animation-delay: 0.20s; }
        .para:nth-child(6)  { animation-delay: 0.25s; }
        .para:nth-child(7)  { animation-delay: 0.30s; }
        .para:nth-child(8)  { animation-delay: 0.35s; }
        .para:nth-child(9)  { animation-delay: 0.40s; }
        .para:nth-child(10) { animation-delay: 0.45s; }
        .para:nth-child(11) { animation-delay: 0.50s; }
        .para:nth-child(12) { animation-delay: 0.50s; }
        .para:nth-child(13) { animation-delay: 0.50s; }
        .para:nth-child(14) { animation-delay: 0.50s; }
        .para:nth-child(15) { animation-delay: 0.50s; }

        @keyframes appear {
            to { opacity: 1; transform: translateY(0); }
        }

        .story-hr {
            border: none;
            border-top: 1px solid #211c15;
            margin: 24px 0;
        }

        /* ── Choices zone — fixed at bottom ──────────── */

        #choices-zone {
            flex-shrink: 0;
            padding: 0 28px 24px;
            border-top: 1px solid #1e1a13;
        }

        #choices-zone.fading {
            opacity: 0;
        }

        .choice {
            display: block;
            width: 100%;
            background: none;
            border: none;
            border-bottom: 1px solid #1a1610;
            color: #7a6e5a;
            font-family: 'Noto Serif', Georgia, serif;
            font-size: 13px;
            line-height: 1.5;
            text-align: left;
            padding: 9px 0 9px 22px;
            cursor: pointer;
            position: relative;
            transition: color 0.2s ease;
        }

        .choice:last-child {
            border-bottom: none;
        }

        .choice::before {
            content: '›';
            position: absolute;
            left: 4px;
            top: 50%;
            transform: translateY(-50%);
            color: #2e261e;
            font-size: 16px;
            transition: left 0.15s ease, color 0.2s ease;
        }

        .choice:hover {
            color: #c8bc9e;
        }

        .choice:hover::before {
            color: #6a5e4a;
            left: 8px;
        }

        /* ── End state ───────────────────────────────── */

        #end {
            display: none;
            text-align: center;
            padding: 32px 0 8px;
        }

        #end p {
            font-size: 10px;
            letter-spacing: 0.4em;
            color: #2e261e;
            text-transform: uppercase;
        }

        /* ── Loading ─────────────────────────────────── */

        #loading {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 10px;
            letter-spacing: 0.35em;
            color: #2e261e;
            text-transform: uppercase;
        }

        /* ── Mobile ──────────────────────────────────── */

        @media (max-width: 480px) {
            body { font-size: 15px; }
            #image-wrap.has-image { height: 160px; }
            #story-zone { padding: 20px 20px 12px; }
            #choices-zone { padding: 0 20px 20px; }
        }
    </style>
</head>
<body>

<div id="app">
    <div id="header">
        <span id="title">Musashi</span>
        <span id="title-kanji">武蔵</span>
    </div>

    <div id="image-wrap">
        <img id="scene-img" src="" alt="">
    </div>

    <div id="loading">Loading…</div>

    <div id="story-zone" style="display:none">
        <div id="content">
            <div id="story"></div>
            <div id="end"><p>— end —</p></div>
        </div>
    </div>

    <div id="choices-zone" style="display:none">
        <div id="choices"></div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/inkjs@2.2.4/dist/ink.js"></script>
<script>
(function () {
    'use strict';

    var story = null;
    var currentImageName = null;
    var FADE_MS = 220;

    // ── DOM refs ────────────────────────────────────
    var loadingEl    = document.getElementById('loading');
    var storyZoneEl  = document.getElementById('story-zone');
    var contentEl    = document.getElementById('content');
    var storyEl      = document.getElementById('story');
    var endEl        = document.getElementById('end');
    var choicesZoneEl = document.getElementById('choices-zone');
    var choicesEl    = document.getElementById('choices');
    var imageWrapEl  = document.getElementById('image-wrap');
    var sceneImgEl   = document.getElementById('scene-img');

    // ── Image ───────────────────────────────────────
    function setImage(name) {
        if (!name || name === currentImageName) return;
        currentImageName = name;
        sceneImgEl.classList.remove('visible');

        function tryLoad(src, fallback) {
            var t = new Image();
            t.onload = function () {
                sceneImgEl.src = src;
                imageWrapEl.classList.add('has-image');
                setTimeout(function () {
                    sceneImgEl.classList.add('visible');
                }, 30);
            };
            t.onerror = function () {
                if (fallback) tryLoad(fallback, null);
            };
            t.src = src;
        }
        tryLoad('images/' + name + '.jpg', 'images/' + name + '.png');
    }

    function processTags(tags) {
        if (!tags) return;
        for (var i = 0; i < tags.length; i++) {
            var tag = tags[i].trim();
            if (tag.indexOf('image:') === 0) {
                setImage(tag.replace('image:', '').trim());
            }
        }
    }

    // ── Rendering ───────────────────────────────────
    function buildContent() {
        storyEl.innerHTML = '';
        endEl.style.display = 'none';
        choicesEl.innerHTML = '';

        while (story.canContinue) {
            var text = story.Continue();
            processTags(story.currentTags);
            if (!text || !text.trim()) continue;
            if (text.trim() === '---') {
                var hr = document.createElement('hr');
                hr.className = 'story-hr';
                storyEl.appendChild(hr);
            } else {
                var p = document.createElement('p');
                p.className = 'para';
                p.textContent = text.trim();
                storyEl.appendChild(p);
            }
        }

        if (story.currentChoices.length > 0) {
            story.currentChoices.forEach(function (choice, i) {
                var btn = document.createElement('button');
                btn.className = 'choice';
                btn.textContent = choice.text;
                btn.addEventListener('click', function () {
                    story.ChooseChoiceIndex(i);
                    advance();
                });
                choicesEl.appendChild(btn);
            });
            choicesZoneEl.style.display = 'block';
        } else {
            endEl.style.display = 'block';
            choicesZoneEl.style.display = 'none';
        }
    }

    // ── Transition ──────────────────────────────────
    function advance() {
        // Fade out
        contentEl.classList.add('fading');
        choicesZoneEl.style.opacity = '0';
        choicesZoneEl.style.transition = 'opacity ' + (FADE_MS / 1000) + 's ease';

        setTimeout(function () {
            buildContent();

            // Scroll story zone to top instantly while invisible
            storyZoneEl.scrollTop = 0;

            // Fade back in
            contentEl.classList.remove('fading');
            choicesZoneEl.style.opacity = '1';
        }, FADE_MS);
    }

    // ── Init ────────────────────────────────────────
    fetch('story.json')
        .then(function (r) {
            if (!r.ok) throw new Error('HTTP ' + r.status);
            return r.text();
        })
        .then(function (json) {
            story = new inkjs.Story(json);
            loadingEl.style.display = 'none';
            storyZoneEl.style.display = 'block';
            buildContent();
            choicesZoneEl.style.display = story.currentChoices.length ? 'block' : 'none';
        })
        .catch(function (err) {
            loadingEl.textContent = 'Could not load story.json — make sure it is in the same folder.';
            console.error(err);
        });
}());
</script>
</body>
</html>
